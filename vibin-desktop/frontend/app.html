<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vibe-In · Desktop</title>
<style>
  :root {
    --bg: #f7eee6;
    --surface: #fff8f1;
    --surface-warm: #ead6c7;
    --fg: #2b211c;
    --fg-2: #5a4b43;
    --muted: #8a7a70;
    --meta: #b46a46;
    --border: #dac8b9;
    --border-soft: #eaded4;
    --accent: #b46a46;
    --accent-on: #ffffff;
    --accent-hover: color-mix(in oklab, var(--accent), black 8%);
    --accent-active: color-mix(in oklab, var(--accent), black 14%);
    --success: #4d8f5a;
    --warn: #c88735;
    --danger: #b84c4c;
    --font-display: 'Iowan Old Style','Charter',Georgia,'Times New Roman',serif;
    --font-body: -apple-system, BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --font-mono: 'SF Mono', ui-monospace, Menlo, monospace;
    --radius-sm: 14px;
    --radius-md: 22px;
    --radius-lg: 34px;
    --radius-pill: 9999px;
    --elev-raised: 8px 10px 24px rgba(128, 92, 70, 0.18), -8px -8px 20px rgba(255, 255, 255, 0.70);
    --focus-ring: 0 0 0 4px rgba(180, 106, 70, 0.24);
    --ease: cubic-bezier(0.2, 0, 0, 1);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
  svg { display: block; }
  ::selection { background: color-mix(in oklab, var(--accent), transparent 75%); }

  /* ─── App shell ─────────────────────────────────────────────── */
  .app {
    height: 100vh;
    display: grid;
    grid-template-columns: 64px auto 1fr;
    grid-template-rows: 100%;
    transition: grid-template-columns 240ms var(--ease);
  }
  .app.rail-collapsed { grid-template-columns: 64px 0 1fr; }

  /* ─── Left icon rail ────────────────────────────────────────── */
  .iconrail {
    background: color-mix(in oklab, var(--surface-warm), transparent 35%);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 0;
    gap: 6px;
  }
  .rail-logo {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: var(--accent);
    color: var(--accent-on);
    display: grid; place-items: center;
    font-family: var(--font-display); font-weight: 600; font-size: 19px;
    margin-bottom: 14px;
    box-shadow: var(--elev-raised);
  }
  .rail-btn {
    width: 44px; height: 44px;
    border-radius: 13px;
    display: grid; place-items: center;
    color: var(--fg-2);
    position: relative;
    transition: background 150ms var(--ease), color 150ms var(--ease), transform 150ms var(--ease);
  }
  .rail-btn svg { width: 22px; height: 22px; }
  .rail-btn:hover { background: color-mix(in oklab, var(--accent), transparent 86%); color: var(--accent); }
  .rail-btn:active { transform: translateY(1px); }
  .rail-btn[aria-pressed="true"] { background: color-mix(in oklab, var(--accent), transparent 78%); color: var(--accent); }
  .rail-btn .tip {
    position: absolute; left: 54px; top: 50%; transform: translateY(-50%);
    background: var(--fg); color: var(--surface);
    font-size: 12px; padding: 5px 9px; border-radius: 8px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity 120ms; z-index: 40;
  }
  .rail-btn:hover .tip { opacity: 1; }
  .rail-spacer { flex: 1; }

  /* ─── Chat / tasks rail ─────────────────────────────────────── */
  .chatrail {
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .app.rail-collapsed .chatrail { border-right: 0; }
  .rail-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border-soft);
  }
  .rail-head h2 { font-family: var(--font-display); font-size: 18px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .collapse-btn {
    width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    color: var(--muted);
  }
  .collapse-btn:hover { background: var(--bg); color: var(--fg); }
  .collapse-btn svg { width: 18px; height: 18px; }

  .rail-tabs { display: flex; gap: 4px; padding: 10px 12px 0; }
  .rail-tab {
    flex: 1; padding: 8px 10px; border-radius: 11px 11px 0 0;
    font-size: 13px; color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .rail-tab[aria-selected="true"] { color: var(--fg); background: var(--bg); font-weight: 600; }
  .rail-tab .count {
    font-family: var(--font-mono); font-size: 11px; background: color-mix(in oklab, var(--accent), transparent 82%);
    color: var(--accent); padding: 1px 6px; border-radius: 999px;
  }

  .rail-scroll { flex: 1; overflow-y: auto; padding: 10px 12px 16px; }
  .rail-scroll::-webkit-scrollbar { width: 8px; }
  .rail-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* task card */
  .task {
    background: var(--bg);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 150ms var(--ease), transform 120ms var(--ease);
  }
  .task:hover { border-color: var(--border); transform: translateY(-1px); }
  .task.active { border-color: var(--accent); box-shadow: var(--focus-ring); }
  .task-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .task-title { font-size: 14px; font-weight: 600; flex: 1; line-height: 1.3; }
  .task-msg { font-size: 13px; color: var(--muted); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .status-dot { width: 9px; height: 9px; border-radius: 99px; flex-shrink: 0; }
  .status-running { background: var(--accent); animation: pulse 1.3s ease-in-out infinite; }
  .status-done { background: var(--success); }
  .status-help { background: var(--danger); }
  @keyframes pulse { 0%,100%{ opacity: 1; box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent), transparent 60%); } 50%{ opacity: .65; box-shadow: 0 0 0 5px color-mix(in oklab, var(--accent), transparent 88%); } }

  /* git mode badge */
  .git-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 999px;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em;
    border: 1px solid var(--border); color: var(--fg-2); background: var(--surface);
  }
  .git-badge svg { width: 12px; height: 12px; }
  .git-badge.worktree { color: var(--accent); border-color: color-mix(in oklab, var(--accent), transparent 60%); background: color-mix(in oklab, var(--accent), transparent 90%); }
  .git-badge.local { color: var(--warn); border-color: color-mix(in oklab, var(--warn), transparent 60%); background: color-mix(in oklab, var(--warn), transparent 90%); }
  .git-badge.master { color: var(--success); border-color: color-mix(in oklab, var(--success), transparent 60%); background: color-mix(in oklab, var(--success), transparent 90%); }

  .task-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 8px; }
  .task.running .task-msg::after { content: ""; }
  .task-prog { height: 3px; background: var(--border-soft); border-radius: 99px; overflow: hidden; margin-top: 10px; }
  .task-prog i { display: block; height: 100%; width: 62%; background: var(--accent); border-radius: 99px; }
  .task-langs { display: flex; gap: 4px; }
  .lang-chip { display: grid; place-items: center; }

  /* new task button */
  .new-task {
    width: 100%; padding: 11px; border-radius: var(--radius-sm);
    border: 1px dashed var(--border); color: var(--muted);
    font-size: 13px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: border-color 150ms, color 150ms;
  }
  .new-task:hover { border-color: var(--accent); color: var(--accent); }
  .new-task svg { width: 15px; height: 15px; }

  /* ─── Main panel ────────────────────────────────────────────── */
  .main { display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  .main-head {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 22px; border-bottom: 1px solid var(--border-soft);
  }
  .main-head .crumb { font-size: 14px; color: var(--muted); }
  .main-head .crumb b { color: var(--fg); font-weight: 600; }
  .session-title-btn { display: inline-flex; align-items: center; gap: 5px; padding: 3px 6px; margin-left: -6px; border-radius: 8px; }
  .session-title-btn:hover { background: var(--surface); color: var(--accent); }
  .session-title-btn svg { width: 13px; height: 13px; }
  .session-title-input { width: min(240px, 34vw); padding: 5px 8px; border: 1px solid var(--accent); border-radius: 8px; background: var(--surface); color: var(--fg); font: inherit; font-weight: 600; box-shadow: var(--focus-ring); }
  .session-title-input:focus { outline: none; }
  .main-head .spacer { flex: 1; }
  .head-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 14px; border-radius: 11px; font-size: 13px; font-weight: 500;
    border: 1px solid var(--border); color: var(--fg-2);
    transition: border-color 150ms, color 150ms, background 150ms;
  }
  .head-btn svg { width: 16px; height: 16px; }
  .head-btn:hover { border-color: var(--accent); color: var(--accent); }
  .head-btn.primary { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
  .head-btn.primary:hover { background: var(--accent-hover); color: var(--accent-on); }

  .chat-scroll { flex: 1; overflow-y: auto; padding: 24px 0; }
  .chat-scroll::-webkit-scrollbar { width: 9px; }
  .chat-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  .chat-inner { max-width: 820px; margin: 0 auto; padding: 0 24px; }

  .msg { display: flex; gap: 12px; margin-bottom: 22px; }
  .msg .ava { width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0; display: grid; place-items: center; font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
  .ava.user { background: var(--surface-warm); color: var(--fg-2); }
  .ava.agent { background: var(--accent); color: var(--accent-on); }
  .msg-body { min-width: 0; }
  .msg-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .msg-name span { color: var(--muted); font-weight: 400; margin-left: 6px; font-family: var(--font-mono); font-size: 11px; }
  .msg-text { font-size: 15px; line-height: 1.6; color: var(--fg-2); }
  .msg.user .msg-text { color: var(--fg); }

  .file-ref {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 8px; margin: 0 1px; border-radius: 7px;
    background: color-mix(in oklab, var(--accent), transparent 88%);
    color: var(--accent); font-family: var(--font-mono); font-size: 13px;
    border: 1px solid color-mix(in oklab, var(--accent), transparent 70%);
  }
  .file-ref svg { width: 12px; height: 12px; }

  .agent-callout {
    border: 1px solid var(--border); border-left: 3px solid var(--accent);
    background: var(--surface); border-radius: 12px; padding: 14px 16px; margin: 8px 0 22px;
  }
  .agent-callout.help { border-left-color: var(--danger); background: color-mix(in oklab, var(--danger), transparent 92%); }
  .agent-callout.done { border-left-color: var(--success); background: color-mix(in oklab, var(--success), transparent 92%); }
  .agent-callout .ac-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .agent-callout.help .ac-title { color: var(--danger); }
  .agent-callout.done .ac-title { color: var(--success); }
  .agent-callout p { margin: 6px 0 0; font-size: 13px; color: var(--fg-2); }

   /* running progress — compact, not a giant bar */
   .runbar { height: 3px; background: var(--border-soft); border-radius: 99px; overflow: hidden; margin-top: 10px; }
   .runbar i { display: block; height: 100%; background: var(--accent); border-radius: 99px; transition: width 600ms var(--ease); }
   .runbar.indeterminate i { width: 35%; animation: slide 1.6s var(--ease) infinite; }
   @keyframes slide { 0%{ transform: translateX(-120%);} 100%{ transform: translateX(330%);} }

   /* agent typing indicator in chat */
   .typing { display: inline-flex; align-items: center; gap: 5px; margin: 4px 0 22px; }
   .typing .ava { width: 32px; height: 32px; }
   .typing .bubble { display: inline-flex; gap: 4px; background: var(--surface); border: 1px solid var(--border-soft); border-radius: 14px; padding: 11px 14px; }
   .typing .bubble span { width: 7px; height: 7px; border-radius: 99px; background: var(--accent); opacity: .4; animation: blink 1.3s infinite; }
   .typing .bubble span:nth-child(2){ animation-delay: .2s; }
   .typing .bubble span:nth-child(3){ animation-delay: .4s; }
   @keyframes blink { 0%,100%{ opacity:.3; transform: translateY(0);} 50%{ opacity:1; transform: translateY(-2px);} }

  /* composer */
  .composer { border-top: 1px solid var(--border-soft); padding: 14px 22px 18px; background: var(--bg); }
  .composer-inner { max-width: 820px; margin: 0 auto; }
  .composer-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 10px 12px; transition: border-color 150ms, box-shadow 150ms;
  }
  .composer-box:focus-within { border-color: var(--accent); box-shadow: var(--focus-ring); }
  .composer-refs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .composer-ref {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 8px; font-family: var(--font-mono); font-size: 12px;
    background: color-mix(in oklab, var(--accent), transparent 88%); color: var(--accent);
    border: 1px solid color-mix(in oklab, var(--accent), transparent 70%);
  }
  .composer-ref button { display: grid; place-items: center; color: inherit; opacity: .7; }
  .composer-ref button:hover { opacity: 1; }
  .composer-ref svg { width: 11px; height: 11px; }
  .composer-row { display: flex; align-items: flex-end; gap: 10px; }
  .composer textarea {
    flex: 1; border: 0; resize: none; background: none; color: var(--fg);
    font: inherit; font-size: 15px; line-height: 1.5; max-height: 140px; padding: 6px 2px;
  }
  .composer textarea:focus { outline: none; }
  .composer-tools { display: flex; align-items: center; gap: 4px; }
  .ctool { width: 34px; height: 34px; border-radius: 10px; display: grid; place-items: center; color: var(--muted); }
  .ctool:hover { background: var(--bg); color: var(--accent); }
  .ctool svg { width: 19px; height: 19px; }
  .send-btn { width: 38px; height: 38px; border-radius: 12px; background: var(--accent); color: var(--accent-on); display: grid; place-items: center; transition: background 150ms, transform 100ms; }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:active { transform: translateY(1px); }
  .send-btn svg { width: 18px; height: 18px; }

  /* ─── Help pop-up (toast) ───────────────────────────────────── */
  .toast-wrap { position: fixed; right: 22px; bottom: 22px; display: flex; flex-direction: column; gap: 12px; z-index: 60; width: 320px; }
  .toast {
    background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--danger);
    border-radius: var(--radius-sm); padding: 14px 16px; box-shadow: var(--elev-raised);
    animation: toast-in 320ms var(--ease) both;
  }
  @keyframes toast-in { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
  .toast .tt-top { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--danger); }
  .toast .tt-bell { width: 18px; height: 18px; }
  .toast p { margin: 6px 0 0; font-size: 13px; color: var(--fg-2); line-height: 1.45; }
  .toast .tt-actions { display: flex; gap: 8px; margin-top: 12px; }
  .toast .tt-btn { padding: 7px 12px; border-radius: 10px; font-size: 13px; font-weight: 500; border: 1px solid var(--border); color: var(--fg-2); }
  .toast .tt-btn:hover { border-color: var(--accent); color: var(--accent); }
  .toast .tt-btn.go { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
  .toast .tt-btn.go:hover { background: var(--accent-hover); color: var(--accent-on); }

  /* ─── Drawer (files / commit / PR) ──────────────────────────── */
  .scrim { position: fixed; inset: 0; background: rgba(43,33,28,0.32); opacity: 0; pointer-events: none; transition: opacity 200ms; z-index: 70; }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: 420px; max-width: 92vw;
    background: var(--surface); box-shadow: -10px 0 40px rgba(128,92,70,0.22);
    transform: translateX(100%); transition: transform 260ms var(--ease); z-index: 80;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: none; }
  .drawer-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border-soft); }
  .drawer-head h3 { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px 20px 24px; }
  .drawer-close { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; color: var(--muted); }
  .drawer-close:hover { background: var(--bg); color: var(--fg); }
  .drawer-close svg { width: 18px; height: 18px; }

  /* file tree */
  .ftree { font-size: 14px; }
  .ftree .fnode { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 9px; cursor: default; }
  .ftree .fnode:hover { background: var(--bg); }
  .ftree .fnode.indent { padding-left: 30px; }
  .ftree .fnode .ficon { width: 16px; height: 16px; flex-shrink: 0; }
  .ftree .fnode .fname { flex: 1; }
  .ftree .fnode .fsize { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }

  /* commit / PR panels */
  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 18px; }
  .field label { font-size: 13px; color: var(--fg-2); font-weight: 500; }
  .input, .textarea {
    width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg); color: var(--fg); font: inherit; font-size: 14px;
  }
  .input:focus, .textarea:focus { outline: none; border-color: var(--accent); box-shadow: var(--focus-ring); }
  .textarea { min-height: 90px; resize: vertical; line-height: 1.55; }
  .diff-row { font-family: var(--font-mono); font-size: 12.5px; padding: 4px 8px; border-radius: 7px; display: flex; gap: 10px; }
  .diff-row.add { background: color-mix(in oklab, var(--success), transparent 90%); color: color-mix(in oklab, var(--success), black 20%); }
  .diff-row.del { background: color-mix(in oklab, var(--danger), transparent 90%); color: color-mix(in oklab, var(--danger), black 20%); }
  .diff-row .dl { width: 14px; flex-shrink: 0; opacity: .8; }
  .branch-row { display: flex; align-items: center; gap: 10px; padding: 11px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px; }
  .branch-row .bname { font-family: var(--font-mono); font-size: 13px; flex: 1; }
  .branch-row .bmeta { font-size: 12px; color: var(--muted); }

  /* language icon colors (kept as tokens via color-mix where possible, fixed brand hues for recognizability) */
  .lc-ts { color: #3178c6; }
  .lc-js { color: #f7df1e; }
  .lc-tsx { color: #3178c6; }
  .lc-rust { color: #dea584; }
  .lc-py { color: #3776ab; }
  .lc-go { color: #00add8; }
  .lc-rs { color: #dea584; }
  .lc-css { color: #663399; }
  .lc-json { color: #cbcb41; }
  .lc-md { color: #519aba; }
  .lc-default { color: var(--muted); }

   /* live chat extras */
   .run { display: inline-flex; align-items: center; gap: 8px; margin: 2px 0 18px; padding: 6px 12px; border-radius: 999px; background: color-mix(in oklab, var(--accent), transparent 91%); border: 1px solid color-mix(in oklab, var(--accent), transparent 74%); color: var(--accent); font-size: 13px; font-weight: 500; }
   .run .dot { width: 8px; height: 8px; border-radius: 99px; background: var(--accent); position: relative; }
   .run .dot::after { content: ''; position: absolute; inset: -3px; border-radius: 99px; border: 2px solid color-mix(in oklab, var(--accent), transparent 45%); animation: pulse 1.6s ease-out infinite; }
   .run .txt { color: var(--fg-2); }
   .run .txt b { color: var(--accent); font-weight: 600; }

   .empty { max-width: 460px; margin: 12vh auto 0; text-align: center; color: var(--muted); }
   .empty .empty-mark { width: 56px; height: 56px; border-radius: 16px; background: var(--accent); color: var(--accent-on); display: grid; place-items: center; font-family: var(--font-display); font-weight: 600; font-size: 28px; margin: 0 auto 18px; box-shadow: var(--elev-raised); }
   .empty h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; color: var(--fg); margin: 0 0 8px; }
   .empty p { font-size: 14px; line-height: 1.6; margin: 0 auto; max-width: 380px; }

  @media (max-width: 920px) {
    .app { grid-template-columns: 56px 0 1fr; }
    .chatrail { position: fixed; left: 56px; top: 0; bottom: 0; z-index: 50; box-shadow: var(--elev-raised); }
    .app.rail-open .chatrail { width: 280px; }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Left icon rail -->
  <aside class="iconrail">
    <div class="rail-logo">V</div>
    <button class="rail-btn" data-toggle="chatrail" aria-pressed="true" title="Chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 12a8 8 0 0 1-11.3 7.3L4 20l1-4.7A8 8 0 1 1 21 12Z"/></svg>
      <span class="tip">Chat &amp; tasks</span>
    </button>
    <button class="rail-btn" id="open-files" title="Files">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 6a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/></svg>
      <span class="tip">Files</span>
    </button>
    <button class="rail-btn" id="open-commit" title="Commit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3.2"/><path d="M12 4v5M12 15v5M4.9 12a7 7 0 0 1 0 0M19.1 12a7 7 0 0 1 0 0"/></svg>
      <span class="tip">Commit changes</span>
    </button>
    <button class="rail-btn" id="open-pr" title="Open PR">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="6" cy="6" r="2.4"/><circle cx="6" cy="18" r="2.4"/><circle cx="18" cy="9" r="2.4"/><path d="M6 8.4v7.2M8.4 6.6c5 0 6 1.6 6 4.4"/></svg>
      <span class="tip">Open pull request</span>
    </button>
    <div class="rail-spacer"></div>
    <button class="rail-btn" id="open-settings" title="Settings" aria-label="Open settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4a1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3 14.1H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.6 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 4.6h.1A1.6 1.6 0 0 0 12 3a2 2 0 1 1 4 0v.1A1.6 1.6 0 0 0 19 4.6Z"/></svg>
      <span class="tip">Settings</span>
    </button>
  </aside>

  <!-- Chat / tasks rail -->
  <aside class="chatrail" id="chatrail">
    <div class="rail-head">
      <h2>Tasks</h2>
      <button class="collapse-btn" id="collapse-rail" title="Collapse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 5l-7 7 7 7M19 5l-7 7 7 7"/></svg>
      </button>
    </div>
    <div class="rail-tabs" role="tablist">
      <button class="rail-tab" data-tab="tasks" aria-selected="true">Tasks</button>
      <button class="rail-tab" data-tab="chats" aria-selected="false">Chats</button>
    </div>
    <div class="rail-scroll">
      <div id="task-list"></div>

      <button class="new-task" id="new-task">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
        New chat
      </button>

      <div id="chat-list" hidden>
        <div class="task active" data-chat="c1">
          <div class="task-top">
            <span class="status-dot status-running" title="Active"></span>
            <span class="task-title">Current session</span>
          </div>
          <div class="task-msg">Live conversation with the Vibe agent.</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main panel -->
  <section class="main">
    <div class="main-head">
      <button class="head-btn" id="head-files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 6a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/></svg>
        Files
      </button>
      <span class="crumb">Vibe-In / <button class="session-title-btn" id="rename-session" title="Rename session"><b id="crumb-task">New chat</b><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg></button></span>
      <span class="spacer"></span>
      <span class="git-badge local" id="head-git">local only</span>
      <button class="head-btn" id="head-commit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3.2"/><path d="M12 4v5M12 15v5"/></svg>
        Commit
      </button>
      <button class="head-btn primary" id="head-pr">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="6" cy="6" r="2.4"/><circle cx="6" cy="18" r="2.4"/><circle cx="18" cy="9" r="2.4"/><path d="M6 8.4v7.2M8.4 6.6c5 0 6 1.6 6 4.4"/></svg>
        Open PR
      </button>
    </div>

    <div class="chat-scroll" id="chat-scroll">
      <div class="chat-inner" id="chat-inner">
        <div class="empty" id="empty-state">
          <div class="empty-mark">V</div>
          <h3>What should we build?</h3>
          <p>Message the agent below. It works inside your repo and can edit files, run commands, and open pull requests.</p>
        </div>
      </div>
    </div>

    <!-- Composer -->
    <div class="composer">
      <div class="composer-inner">
        <div class="composer-box">
          <div class="composer-refs" id="composer-refs"></div>
          <div class="composer-row">
            <textarea id="composer-input" rows="1" placeholder="Message the agent…  use @ to reference a file"></textarea>
            <div class="composer-tools">
              <button class="ctool" id="ref-file" title="Reference a file">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 6a2 2 0 0 1 2-2h4l2 2h6a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2Z"/></svg>
              </button>
              <button class="ctool" title="Attach">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 11l-8.5 8.5a4 4 0 0 1-5.7-5.7L15 5.3a2.5 2.5 0 0 1 3.5 3.5L9.8 17.5"/></svg>
              </button>
              <button class="send-btn" id="send-btn" title="Send">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M4 12l16-8-6 16-3-7-7-1Z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<!-- Help toast -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- Drawer -->
<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3 id="drawer-title">Files</h3>
    <button class="drawer-close" id="drawer-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script type="module" src="/src/theme.js"></script>
<script type="module" src="/src/app.js"></script>
</body>
</html>
