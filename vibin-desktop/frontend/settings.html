<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vibin · Settings</title>
<style>
:root{--bg:#f7eee6;--surface:#fff8f1;--surface-warm:#ead6c7;--fg:#2b211c;--fg-2:#5a4b43;--muted:#8a7a70;--border:#dac8b9;--border-soft:#eaded4;--accent:#b46a46;--accent-on:#fff;--display:'Iowan Old Style','Charter',Georgia,serif;--body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--body);-webkit-font-smoothing:antialiased}.shell{min-height:100vh;display:grid;grid-template-columns:240px 1fr}.side{padding:24px 18px;background:var(--surface);border-right:1px solid var(--border)}.brand{display:flex;align-items:center;gap:11px;font:600 19px var(--display);margin-bottom:34px}.mark{width:38px;height:38px;border-radius:12px;background:var(--accent);color:var(--accent-on);display:grid;place-items:center}.back{display:block;padding:10px 12px;border-radius:12px;color:var(--fg-2);text-decoration:none;font-size:14px}.back:hover{background:color-mix(in oklab,var(--accent),transparent 88%);color:var(--accent)}.label{margin:28px 12px 8px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}.nav{padding:10px 12px;border-radius:12px;background:color-mix(in oklab,var(--accent),transparent 82%);color:var(--accent);font-size:14px;font-weight:600}main{padding:52px clamp(28px,6vw,88px)}.content{max-width:900px}.eyebrow{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}h1{font:600 clamp(36px,5vw,52px)/1 var(--display);letter-spacing:-.03em;margin:9px 0 13px}header p{color:var(--fg-2);margin:0 0 42px;max-width:590px;line-height:1.6}.section-head{display:flex;align-items:end;justify-content:space-between;margin-bottom:16px}.section-head h2{font:600 23px var(--display);margin:0}.section-head span{color:var(--muted);font-size:13px}.theme-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.theme-card{display:grid;grid-template-columns:82px 1fr 24px;align-items:center;gap:15px;text-align:left;padding:15px;border:1px solid var(--border);border-radius:22px;background:var(--surface);color:var(--fg);font:inherit;cursor:pointer;transition:.15s}.theme-card:hover{transform:translateY(-2px);border-color:var(--accent)}.theme-card.active{border-color:var(--accent);box-shadow:0 0 0 4px color-mix(in oklab,var(--accent),transparent 76%)}.preview{height:62px;border-radius:14px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr}.preview i:first-child{grid-row:span 2}.preview i:last-child{border-radius:999px;margin:10px}.copy{display:flex;flex-direction:column;gap:5px}.copy small{color:var(--muted);font-size:12px}.check{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;background:var(--accent);color:var(--accent-on);opacity:0}.active .check{opacity:1}.note{margin-top:26px;padding:16px 18px;border:1px solid var(--border-soft);border-radius:14px;background:var(--surface);color:var(--muted);font-size:13px}.note b{color:var(--fg-2)}@media(max-width:760px){.shell{grid-template-columns:1fr}.side{padding:14px 18px;border-right:0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}.brand{margin:0}.label,.nav{display:none}main{padding:32px 20px}.theme-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side"><div class="brand"><span class="mark">V</span>Vibin</div><a class="back" href="app.html">← Back to chat</a><div class="label">Settings</div><div class="nav">Appearance</div></aside>
  <main><div class="content"><header><span class="eyebrow">Personalize Vibin</span><h1>Settings</h1><p>Choose a workspace theme. Your selection is saved locally and applied across the desktop app.</p></header><section><div class="section-head"><h2>Color theme</h2><span>Applies instantly</span></div><div class="theme-grid" id="theme-grid"></div></section><div class="note"><b>Local preference.</b> Theme settings stay on this device.</div></div></main>
</div>
<script type="module" src="/src/settings.js"></script>
</body>
</html>
