<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vibin · Settings</title>
<style>
:root{--bg:#f7eee6;--surface:#fff8f1;--surface-warm:#ead6c7;--fg:#2b211c;--fg-2:#5a4b43;--muted:#8a7a70;--border:#dac8b9;--border-soft:#eaded4;--accent:#b46a46;--accent-on:#fff;--display:'Iowan Old Style','Charter',Georgia,serif;--body:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box}html,body{min-height:100%}body{margin:0;background:var(--bg);color:var(--fg);font-family:var(--body);-webkit-font-smoothing:antialiased}.shell{min-height:100vh;display:grid;grid-template-columns:240px 1fr}.side{padding:24px 18px;background:var(--surface);border-right:1px solid var(--border)}.brand{display:flex;align-items:center;gap:11px;font:600 19px var(--display);margin-bottom:34px}.mark{width:38px;height:38px;border-radius:12px;background:var(--accent);color:var(--accent-on);display:grid;place-items:center}.back{display:block;padding:10px 12px;border-radius:12px;color:var(--fg-2);text-decoration:none;font-size:14px}.back:hover{background:color-mix(in oklab,var(--accent),transparent 88%);color:var(--accent)}.label{margin:28px 12px 8px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase}.nav{padding:10px 12px;border-radius:12px;background:color-mix(in oklab,var(--accent),transparent 82%);color:var(--accent);font-size:14px;font-weight:600}main{padding:52px clamp(28px,6vw,88px)}.content{max-width:900px}.eyebrow{color:var(--accent);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}h1{font:600 clamp(36px,5vw,52px)/1 var(--display);letter-spacing:-.03em;margin:9px 0 13px}header p{color:var(--fg-2);margin:0 0 42px;max-width:590px;line-height:1.6}.section-head{display:flex;align-items:end;justify-content:space-between;margin-bottom:16px}.section-head h2{font:600 23px var(--display);margin:0}.section-head span{color:var(--muted);font-size:13px}.theme-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.theme-card{display:grid;grid-template-columns:82px 1fr 24px;align-items:center;gap:15px;text-align:left;padding:15px;border:1px solid var(--border);border-radius:22px;background:var(--surface);color:var(--fg);font:inherit;cursor:pointer;transition:.15s}.theme-card:hover{transform:translateY(-2px);border-color:var(--accent)}.theme-card.active{border-color:var(--accent)}.preview{height:62px;border-radius:14px;overflow:hidden}.theme-card.active{box-shadow:none!important}.back:hover{background:transparent}.nav{background:var(--surface-warm)}.theme-card.active{background:var(--surface)}
</style>
</head>
<body>
<div id="settings-root">
  <div class="shell">
    <aside class="side"><div class="brand"><span class="mark">V</span>Vibin</div><a class="back" href="app.html">← Back to chat</a><div class="label">Settings</div><div class="nav">Appearance</div></aside>
    <main><div class="content"><header><span class="eyebrow">Personalize Vibin</span><h1>Settings</h1><p>Choose a workspace theme. Your selection is applied across the desktop app.</p></header><section><div class="section-head"><h2>Color theme</h2><span>Applies instantly</span></div><div class="theme-grid" id="theme-grid"></div></section></div></main>
  </div>
</div>
<script type="module" src="/src/settings.js"></script>
</body>
</html>
